name: presentation
description: Scaffold une couche presentation (feature) conforme à ce repo.
version: 0.1.0+0

environment:
  mason: ">=0.1.0 <0.2.0"

vars:
  name:
    type: string
    description: Nom du package (snake_case), ex. match_detail_presentation.
    default: my_feature_presentation
    prompt: Nom du package ?
  classname:
    type: string
    description: Nom de la feature (snake_case), ex. match_detail.
    default: my_feature
    prompt: Nom de la feature ?
